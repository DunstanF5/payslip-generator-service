<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <title>Payslip</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            margin: 40px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }
        .company-name {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .company-address {
            font-size: 11px;
            color: #666;
        }
        .title {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-weight: bold;
            background-color: #f0f0f0;
            padding: 8px;
            margin-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
        .label {
            width: 50%;
            color: #555;
        }
        .value {
            width: 50%;
            text-align: right;
            font-weight: bold;
        }
        .total-row {
            background-color: #f9f9f9;
            font-size: 14px;
        }
        .net-pay {
            background-color: #e8f5e9;
            font-size: 16px;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 10px;
            color: #888;
        }
    </style>
</head>
<body>
<!-- Header -->
<div class="header">
    <div class="company-name" th:text="${companyName}">Company Name</div>
    <div class="company-address" th:text="${companyAddress}">Company Address</div>
    <div class="title">PAYSLIP</div>
</div>

<!-- Employee Details -->
<div class="section">
    <div class="section-title">Employee Details</div>
    <table>
        <tr>
            <td class="label">Employee ID:</td>
            <td class="value" th:text="${employeeId}">EMP001</td>
        </tr>
        <tr>
            <td class="label">Employee Name:</td>
            <td class="value" th:text="${employeeName}">John Smith</td>
        </tr>
        <tr>
            <td class="label">Pay Period:</td>
            <td class="value" th:text="${periodStart} + ' - ' + ${periodEnd}">01/01/2026 - 31/01/2026</td>
        </tr>
    </table>
</div>

<!-- Earnings -->
<div class="section">
    <div class="section-title">Earnings</div>
    <table>
        <tr>
            <td class="label">Gross Salary:</td>
            <td class="value">$<span th:text="${#numbers.formatDecimal(grossSalary, 1, 2)}">0.00</span></td>
        </tr>
    </table>
</div>

<!-- Deductions -->
<div class="section">
    <div class="section-title">Deductions</div>
    <table>
        <tr>
            <td class="label">Tax:</td>
            <td class="value">$<span th:text="${#numbers.formatDecimal(taxDeduction, 1, 2)}">0.00</span></td>
        </tr>
    </table>
</div>

<!-- Net Pay -->
<div class="section">
    <table>
        <tr class="net-pay">
            <td class="label">NET PAY:</td>
            <td class="value">$<span th:text="${#numbers.formatDecimal(netSalary, 1, 2)}">0.00</span></td>
        </tr>
    </table>
</div>

<!-- Footer -->
<div class="footer">
    <p>This is a computer-generated document. No signature required.</p>
    <p th:text="'Generated on: ' + ${generatedDate}">Generated on: 2026-04-03</p>
</div>
</body>
</html>
