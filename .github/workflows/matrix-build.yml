name: Matrix Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        java: [ '17', '21' ]
      fail-fast: false
    name: Test on ${{ matrix.os }} with Java ${{ matrix.java }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Print environment
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Java version: ${{ matrix.java }}"
          java -version

      - name: Run tests
        run: mvn clean test
  
  test-summary:
    needs: tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.tests.result }}" == "success" ]; then
            echo "✅ All matrix tests passed!"
          else
            echo "❌ Some tests failed"
            exit 1
          fi