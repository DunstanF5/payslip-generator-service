name: Environment and secrets demo

on:
  workflow_dispatch:

env:
  APP_NAME: payslip-generator-service
  JAVA_VERSION: '17'

jobs:
  demo:
    runs-on: ubuntu-latest
    env:
      JOB_LEVEL_VAR: "This is from job level"

    steps:
      - name: Print workflow variable
        run: |
          echo "App Name: $APP_NAME"
          echo "Java version $JAVA_VERSION"

      - name: Print job level variable
        run: echo "Job var $JOB_LEVEL_VAR"

      - name: Print step variable
        env:
          STEP_VAR: "This is only exists in this step"
        run:
          echo "Step var: $STEP_VAR"

      - name: Print github context
        run: |
          echo "Actor: ${{ github.actor }}"                                                                                                                                     
          echo "Repository: ${{ github.repository }}"                                                                                                                           
          echo "Branch: ${{ github.ref }}" 



