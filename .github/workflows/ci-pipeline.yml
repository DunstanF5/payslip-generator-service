name: ci-pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: build
        run: mvn clean compile

  unit-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: run tests
        run: mvn test

  code-quality:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: code quality check
        run: mvn dependency:analyze

  summary:
    needs: [unit-tests, code-quality]
    runs-on: ubuntu-latest
    steps:
      - name: print summary
        run: |
          echo "========================================"                                                                                                                       
          echo "CI Pipeline Complete!"                                                                                                                                          
          echo "========================================"  
