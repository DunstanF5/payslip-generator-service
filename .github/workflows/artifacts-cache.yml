name: Artifact Cache

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      jar-name: ${{ steps.build-info.outputs.jar-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests

      - name: Get JAR name
        id: build-info
        run: |
          JAR_NAME=$(ls target/*.jar | head -1 | xargs basename)
          echo "jar-name=$JAR_NAME" >> $GITHUB_OUTPUT
          echo "Built: $JAR_NAME"

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: payslip-service-jar
          path: target/*.jar
          retention-days: 7

      - name: Reports Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 5

  verify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: payslip-service-jar
          path: ./downloaded

      - name: List downloaded files
        run: ls -la ./downloaded

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify JAR
        run: |
          echo "Verifying JAR: ${{ needs.build.outputs.jar-name }}"
          jar tf ./downloaded/*.jar | head -20
          echo "JAR verification complete"   

  cache-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Print timing
        run: |
          echo "Maven cache should speed up this build..."
          time mvn compile

